<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>NNMC Student Hub Dev Test</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;background:#111;color:#eee;padding:18px}
    h1{color:#7fc1ff}
    section{background:#1c1c1c;border:1px solid #333;padding:12px;margin:12px 0;border-radius:6px}
    .row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    input,button,textarea{padding:8px;border-radius:4px;border:1px solid #444;background:#222;color:#eee}
    button{background:#3a7;cursor:pointer}
    button.danger{background:#c55}
    pre{background:#0f0f0f;color:#cfc;font-size:13px;padding:10px;border-radius:4px;max-height:240px;overflow:auto}
    .meta{font-size:13px;color:#aaa;margin-bottom:6px}
    label{min-width:120px}
  </style>
</head>
<body>
  <h1>Northern New Mexico College Student Hub Developer Test</h1>
  <div class="meta">API Base: <strong>http://localhost:8000/api</strong> — use UUID strings for all IDs</div>

  <!-- Helper -->
  <script>
    const API_BASE = 'http://localhost:8000/api';
    async function apiRequest(method, path, body, outputEl){
      const url = API_BASE + path;
      outputEl.innerText = 'Loading...';
      console.log(new Date().toISOString(), method, url, body||'');
      try{
        const opts = {method,headers:{'Content-Type':'application/json'}};
        if(body) opts.body = JSON.stringify(body);
        const res = await fetch(url, opts);
        const text = await res.text();
        let data;
        try{data = text ? JSON.parse(text) : null}catch(e){data = text}
        const out = {status:res.status, url, method, data};
        outputEl.innerText = JSON.stringify(out,null,2);
        console.log('Response', out);
      }catch(err){
        console.error(err);
        outputEl.innerText = 'Error: '+(err.message||err);
      }
    }
  </script>

  <!-- Universities -->
  <section id="universities">
    <h2>Universities</h2>
    <div class="row">
      <label>Search term</label>
      <input id="uni-search" placeholder="optional" />
      <button onclick="apiRequest('GET', '/universities' + (document.getElementById('uni-search').value ? '?search='+encodeURIComponent(document.getElementById('uni-search').value):''), null, document.getElementById('uni-out'))">Search/List</button>
    </div>
    <div class="row">
      <label>University ID (UUID)</label>
      <input id="uni-id" placeholder="uuid" />
      <button onclick="apiRequest('GET', '/universities/'+encodeURIComponent(document.getElementById('uni-id').value), null, document.getElementById('uni-out'))">View</button>
    </div>
    <pre id="uni-out">-</pre>
  </section>

  <!-- Programs -->
  <section id="programs">
    <h2>Programs</h2>
    <div class="row">
      <label>University ID (UUID)</label>
      <input id="prog-uni-id" placeholder="optional uuid" />
      <button onclick="(function(){const u=document.getElementById('prog-uni-id').value.trim(); apiRequest('GET', u? '/universities/'+encodeURIComponent(u)+'/programs':'/programs', null, document.getElementById('prog-out'))})()">List</button>
    </div>
    <div class="row">
      <label>Program ID (UUID)</label>
      <input id="prog-id" placeholder="uuid" />
      <button onclick="apiRequest('GET', '/programs/'+encodeURIComponent(document.getElementById('prog-id').value), null, document.getElementById('prog-out'))">View</button>
    </div>
    <pre id="prog-out">-</pre>
  </section>

  <!-- Courses -->
  <section id="courses">
    <h2>Courses</h2>
    <div class="row">
      <label>Search term</label>
      <input id="course-search" placeholder="optional" />
      <button onclick="apiRequest('GET', '/courses' + (document.getElementById('course-search').value ? '?search='+encodeURIComponent(document.getElementById('course-search').value):''), null, document.getElementById('course-out'))">Search/List</button>
    </div>
    <div class="row">
      <label>Course ID (UUID)</label>
      <input id="course-id" placeholder="uuid" />
      <button onclick="apiRequest('GET', '/courses/'+encodeURIComponent(document.getElementById('course-id').value), null, document.getElementById('course-out'))">View</button>
      <button onclick="apiRequest('GET', '/courses/'+encodeURIComponent(document.getElementById('course-id').value) + '/prerequisites', null, document.getElementById('course-out'))">Prerequisites</button>
      <button onclick="apiRequest('GET', '/courses/'+encodeURIComponent(document.getElementById('course-id').value) + '/corequisites', null, document.getElementById('course-out'))">Corequisites</button>
    </div>
    <pre id="course-out">-</pre>
  </section>

  <!-- Plans -->
  <section id="plans">
    <h2>Plans</h2>
    <div class="row">
      <label>List Plans</label>
      <button onclick="apiRequest('GET','/plans',null,document.getElementById('plans-out'))">List</button>
    </div>
    <div class="row">
      <label>Create Plan</label>
      <input id="plan-name" placeholder="name" />
      <input id="plan-id" placeholder="id (uuid)" />
      <button onclick="(function(){const id=document.getElementById('plan-id').value, name=document.getElementById('plan-name').value; if(!id||!name){alert('id and name required');return;} apiRequest('POST','/plans',{id:id,name:name},document.getElementById('plans-out'))})()">Create</button>
    </div>
    <div class="row">
      <label>Plan ID (UUID)</label>
      <input id="plan-view-id" placeholder="uuid" />
      <button onclick="apiRequest('GET','/plans/'+encodeURIComponent(document.getElementById('plan-view-id').value),null,document.getElementById('plans-out'))">View</button>
      <button class="danger" onclick="if(confirm('Delete?')) apiRequest('DELETE','/plans/'+encodeURIComponent(document.getElementById('plan-view-id').value),null,document.getElementById('plans-out'))">Delete</button>
    </div>
    <pre id="plans-out">-</pre>
  </section>

  <!-- Plan Courses -->
  <section id="plan-courses">
    <h2>Plan Courses</h2>
    <div class="row">
      <label>Plan ID (UUID)</label>
      <input id="pc-plan-id" placeholder="uuid" />
      <label>Course ID (UUID)</label>
      <input id="pc-course-id" placeholder="uuid" />
    </div>
    <div class="row">
      <button onclick="apiRequest('GET','/plans/'+encodeURIComponent(document.getElementById('pc-plan-id').value)+'/courses',null,document.getElementById('pc-out'))">List Courses</button>
      <input id="pc-term-id" placeholder="term id (uuid, optional)" />
      <button onclick="(function(){const p=document.getElementById('pc-plan-id').value,c=document.getElementById('pc-course-id').value,t=document.getElementById('pc-term-id').value; if(!p||!c){alert('plan and course ids required');return;} apiRequest('POST','/plans/'+encodeURIComponent(p)+'/courses',{course_id:c,term_id:t||undefined},document.getElementById('pc-out'))})()">Add Course</button>
      <button onclick="apiRequest('DELETE','/plans/'+encodeURIComponent(document.getElementById('pc-plan-id').value)+'/courses/'+encodeURIComponent(document.getElementById('pc-course-id').value),null,document.getElementById('pc-out'))">Remove Course</button>
    </div>
    <div class="row">
      <label>New Term ID (UUID)</label>
      <input id="pc-new-term-id" placeholder="uuid" />
      <button onclick="(function(){const p=document.getElementById('pc-plan-id').value,c=document.getElementById('pc-course-id').value,n=document.getElementById('pc-new-term-id').value; if(!p||!c||!n){alert('plan, course, new term required');return;} apiRequest('PATCH','/plans/'+encodeURIComponent(p)+'/courses/'+encodeURIComponent(c),{term_id:n},document.getElementById('pc-out'))})()">Move Course (PATCH)</button>
    </div>
    <pre id="pc-out">-</pre>
  </section>

</body>
</html>
